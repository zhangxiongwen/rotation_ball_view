  (Fibonacci sphere layout, depth scaling, opacity, drag-to-rotate, tap index callback).
version: 0.1.0+1
homepage: https://github.com/your-org/rotation_ball_view
repository: https://github.com/your-org/rotation_ball_view
issue_tracker: https://github.com/your-org/rotation_ball_view/issues
license: MIT

environment:
  sdk: ^3.8.1
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

